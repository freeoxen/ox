# Coverage thresholds for Rust crates and TypeScript packages.
#
# Modules not listed use the global threshold from [global].
# Set to 0 to exclude a module from threshold enforcement.
# The key matches against the file path prefix in coverage output.

[global]
rust = 70
typescript = 80

[rust]
# Core — pure store logic, fully testable
# Lowered from 95: run_turn/execute_tools best tested cross-crate (ox-core)
ox-kernel = 92
ox-store-util = 90
ox-context = 85
ox-ui = 80
ox-broker = 80
# target: 80 (current: 91)
ox-gate = 80
# target: 80 (current: 84)
ox-history = 80
ox-inbox = 75
ox-runtime = 65

# CLI — mostly TUI rendering, hard to unit test
ox-cli = 30

# Pure data types — all derive-only structs, no logic to test
ox-types = 0

# Cross-compiled / untestable via llvm-cov
ox-wasm = 0
ox-web = 0
ox-core = 0
ox-dev-server = 0
ox-emscripten = 0

# Proc macro — runs at compile time, not during tests
ox-path = 0

[typescript]
# Longest matching prefix wins.
# e.g. src/lib/stores/api-keys.ts matches "src/lib/stores" (90%)
# and src/lib/theme-data.ts matches "src/lib" (80%)

# target: 90 (theme.ts at 50%, tools.ts at 82%)
src/lib/stores = 50
src/lib = 50
