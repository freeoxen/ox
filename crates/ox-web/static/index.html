<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ox playground</title>
    <link rel="stylesheet" href="/dist/main.css">
</head>
<body>
    <div id="theme-picker"></div>
    <div class="container">
        <div class="chat-column">
            <div class="header-row">
                <h1>ox <span>playground</span></h1>
            </div>
            <div id="output"><span class="system">Loading wasm module...</span>
</div>
            <div id="status-bar"></div>
            <div id="input-row">
                <input id="input" type="text" placeholder="Type a message..." disabled />
                <button id="send" disabled>Send</button>
            </div>
        </div>
        <div class="debug-column">
            <div>
                <div class="debug-header">
                    <h2>context</h2>
                    <span class="path">/</span>
                </div>
                <div id="debugger" class="debug-panel"><span class="empty">waiting for wasm...</span></div>
            </div>
            <div>
                <div class="debug-header">
                    <h2>tools</h2>
                </div>
                <div id="tool-panel" class="debug-panel"></div>
            </div>
            <div>
                <div class="debug-header">
                    <h2>request log</h2>
                </div>
                <div id="request-log" class="debug-panel"><span class="empty">no requests yet</span></div>
            </div>
        </div>
    </div>

    <script type="module" src="/dist/main.js"></script>
</body>
</html>
