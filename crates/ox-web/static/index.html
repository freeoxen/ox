<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ox prototype</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 40px 20px;
        }
        .container {
            display: flex;
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-column {
            flex: 1;
            min-width: 0;
            max-width: 720px;
        }
        .debug-column {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 { margin-bottom: 20px; color: #7fdbca; }
        #output {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 16px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user-msg { color: #82aaff; }
        .assistant-msg { color: #c3e88d; }
        .tool-call { color: #ffcb6b; }
        .tool-result { color: #c792ea; }
        .error { color: #ff5370; }
        .system { color: #546e7a; font-style: italic; }
        #input-row {
            display: flex;
            gap: 8px;
        }
        #input {
            flex: 1;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            outline: none;
        }
        #input:focus { border-color: #7fdbca; }
        button {
            padding: 10px 20px;
            font-family: monospace;
            font-size: 14px;
            background: #7fdbca;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #5fb8a0; }
        button:disabled { background: #546e7a; cursor: not-allowed; }

        /* --- status bar --- */
        #status-bar {
            height: 24px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #546e7a;
        }
        #status-bar:empty { margin-bottom: 0; }
        #status-bar .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7fdbca;
            animation: pulse 1.2s ease-in-out infinite;
        }
        #status-bar .status-label { color: #7fdbca; }
        #status-bar .status-detail { color: #546e7a; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- context debugger --- */
        .debug-header {
            color: #7fdbca;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .debug-header h2 {
            font-size: 14px;
            color: #7fdbca;
        }
        .debug-header .path {
            color: #546e7a;
        }
        .debug-panel {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            max-height: 720px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }
        .debug-panel details {
            margin-bottom: 2px;
        }
        .debug-panel summary {
            cursor: pointer;
            color: #7fdbca;
            padding: 4px 0;
            user-select: none;
            list-style: none;
        }
        .debug-panel summary::before {
            content: '\25b8 ';
            color: #546e7a;
        }
        .debug-panel details[open] > summary::before {
            content: '\25be ';
        }
        .debug-panel .section-body {
            padding-left: 16px;
            border-left: 1px solid #2a2a4a;
            margin-left: 4px;
            margin-bottom: 8px;
        }
        .debug-panel .kv {
            display: flex;
            gap: 8px;
        }
        .debug-panel .kv .k {
            color: #546e7a;
            flex-shrink: 0;
        }
        .debug-panel .kv .v {
            color: #e0e0e0;
            word-break: break-all;
        }
        .debug-panel .str-val {
            color: #c3e88d;
        }
        .debug-panel .num-val {
            color: #f78c6c;
        }
        .debug-panel .empty {
            color: #546e7a;
            font-style: italic;
        }

        /* --- context debugger --- */
        .debug-panel .msg-entry {
            margin-bottom: 4px;
        }
        .debug-panel .role-badge {
            display: inline-block;
            padding: 0 4px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
        }
        .debug-panel .role-user {
            background: #1a2744;
            color: #82aaff;
        }
        .debug-panel .role-assistant {
            background: #1a2e1a;
            color: #c3e88d;
        }
        .debug-panel .role-tool-result {
            background: #2a1a2e;
            color: #c792ea;
        }
        .debug-panel .block-tag {
            color: #546e7a;
            font-size: 11px;
        }
        .debug-panel .tool-name {
            color: #ffcb6b;
        }
        .debug-panel .msg-content {
            padding-left: 16px;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .debug-panel .msg-content-trunc {
            color: #546e7a;
            font-style: italic;
        }
        .debug-panel .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .debug-panel .edit-btn {
            padding: 1px 6px;
            font-size: 11px;
            font-family: monospace;
            background: transparent;
            color: #546e7a;
            border: 1px solid #546e7a;
            border-radius: 2px;
            cursor: pointer;
            font-weight: normal;
        }
        .debug-panel .edit-btn:hover {
            color: #7fdbca;
            border-color: #7fdbca;
        }
        .debug-panel .system-textarea {
            width: 100%;
            min-height: 120px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1a30;
            color: #c3e88d;
            border: 1px solid #7fdbca;
            border-radius: 2px;
            resize: vertical;
            outline: none;
        }
        .debug-panel .edit-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .debug-panel .edit-actions button {
            padding: 2px 10px;
            font-size: 11px;
            font-family: monospace;
            border-radius: 2px;
            font-weight: normal;
        }
        .debug-panel .save-btn {
            background: #7fdbca;
            color: #1a1a2e;
            border: none;
            cursor: pointer;
        }
        .debug-panel .save-btn:hover { background: #5fb8a0; }
        .debug-panel .cancel-btn {
            background: transparent;
            color: #546e7a;
            border: 1px solid #546e7a;
            cursor: pointer;
        }
        .debug-panel .cancel-btn:hover {
            color: #e0e0e0;
            border-color: #e0e0e0;
        }

        /* --- tool panel --- */
        .tool-form-field {
            margin-bottom: 8px;
        }
        .tool-form-field label {
            display: block;
            color: #546e7a;
            font-size: 11px;
            margin-bottom: 2px;
        }
        .tool-form-field input,
        .tool-form-field textarea {
            width: 100%;
            padding: 6px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1a30;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 2px;
            outline: none;
        }
        .tool-form-field input:focus,
        .tool-form-field textarea:focus {
            border-color: #7fdbca;
        }
        .tool-form-field textarea {
            resize: vertical;
            min-height: 60px;
        }
        .tool-form-actions {
            display: flex;
            gap: 6px;
        }
        .tool-form-actions button {
            padding: 4px 12px;
            font-size: 11px;
            font-family: monospace;
            font-weight: normal;
            border-radius: 2px;
        }
        .tool-form-error {
            color: #ff5370;
            font-size: 11px;
            margin-top: 4px;
        }
        .profile-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .profile-row select {
            flex: 1;
            padding: 4px 6px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1a30;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 2px;
            outline: none;
        }
        .profile-row select:focus { border-color: #7fdbca; }
        .profile-row button {
            padding: 2px 8px;
            font-size: 11px;
            font-family: monospace;
            font-weight: normal;
            border-radius: 2px;
        }
        .profile-name-input {
            flex: 1;
            padding: 4px 6px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1a30;
            color: #e0e0e0;
            border: 1px solid #7fdbca;
            border-radius: 2px;
            outline: none;
        }
        .tool-library-list {
            margin-bottom: 8px;
        }
        .tool-library-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
        }
        .tool-library-row input[type="checkbox"] {
            accent-color: #7fdbca;
        }
        .tool-library-row .tool-lib-name {
            flex: 1;
            color: #ffcb6b;
            font-size: 12px;
        }
        .tool-library-row .tool-lib-del {
            padding: 1px 6px;
            font-size: 10px;
            font-family: monospace;
            background: transparent;
            color: #546e7a;
            border: 1px solid #546e7a;
            border-radius: 2px;
            cursor: pointer;
            font-weight: normal;
        }
        .tool-library-row .tool-lib-del:hover {
            color: #ff5370;
            border-color: #ff5370;
        }
        .tool-panel-divider {
            border: none;
            border-top: 1px solid #2a2a4a;
            margin: 8px 0;
        }
        .tool-panel-empty {
            color: #546e7a;
            font-size: 11px;
            font-style: italic;
            margin-bottom: 8px;
        }

        /* --- request log --- */
        .debug-panel .request-json {
            background: #0d1a30;
            color: #e0e0e0;
            padding: 8px;
            margin: 4px 0;
            border-radius: 2px;
            font-size: 11px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-column">
            <h1>ox prototype</h1>
            <div id="output"><span class="system">Loading wasm module...</span>
</div>
            <div id="status-bar"></div>
            <div id="input-row">
                <input id="input" type="text" placeholder="Type a message..." disabled />
                <button id="send" disabled>Send</button>
            </div>
        </div>
        <div class="debug-column">
            <div>
                <div class="debug-header">
                    <h2>context</h2>
                    <span class="path">/</span>
                </div>
                <div id="debugger" class="debug-panel"><span class="empty">waiting for wasm...</span></div>
            </div>
            <div>
                <div class="debug-header">
                    <h2>tools</h2>
                </div>
                <div id="tool-panel" class="debug-panel"></div>
            </div>
            <div>
                <div class="debug-header">
                    <h2>request log</h2>
                </div>
                <div id="request-log" class="debug-panel"><span class="empty">no requests yet</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { create_agent } from '/pkg/ox_web.js';

        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusBar = document.getElementById('status-bar');

        function setStatus(label, detail) {
            statusBar.textContent = '';
            if (!label) return;
            const dot = document.createElement('span');
            dot.className = 'status-dot';
            statusBar.appendChild(dot);
            const lbl = document.createElement('span');
            lbl.className = 'status-label';
            lbl.textContent = label;
            statusBar.appendChild(lbl);
            if (detail) {
                const det = document.createElement('span');
                det.className = 'status-detail';
                det.textContent = detail;
                statusBar.appendChild(det);
            }
        }
        const debugger_ = document.getElementById('debugger');
        const requestLogEl = document.getElementById('request-log');
        const toolPanelEl = document.getElementById('tool-panel');

        let requestLog = [];

        // --- Tool library persistence (localStorage) ---

        // Built-in tools shipped with the shell — always available, not user-editable.
        const BUILTIN_TOOLS = [
            {
                name: 'reverse_text',
                description: 'Reverse the characters in a string',
                params: '(text: string)',
                body: 'return text.split("").reverse().join("");',
            },
        ];
        const BUILTIN_NAMES = new Set(BUILTIN_TOOLS.map(t => t.name));

        const FACTORY_PROFILE = 'factory default';

        const ToolStore = {
            isFactory(name) { return name === FACTORY_PROFILE; },
            // Merged view: builtins + user library
            loadLibrary() {
                const lib = {};
                for (const t of BUILTIN_TOOLS) lib[t.name] = t;
                try {
                    const user = JSON.parse(localStorage.getItem('ox:tool-library'));
                    if (user) Object.assign(lib, user);
                } catch (_) {}
                return lib;
            },
            // Only persist user-defined tools (not builtins)
            _loadUserLibrary() {
                try { return JSON.parse(localStorage.getItem('ox:tool-library')) || {}; }
                catch (_) { return {}; }
            },
            saveLibrary(lib) { localStorage.setItem('ox:tool-library', JSON.stringify(lib)); },
            saveTool(def) {
                const lib = this._loadUserLibrary();
                lib[def.name] = def;
                this.saveLibrary(lib);
            },
            deleteTool(name) {
                if (BUILTIN_NAMES.has(name)) return; // can't delete builtins
                const lib = this._loadUserLibrary();
                delete lib[name];
                this.saveLibrary(lib);
                // Also remove from all user profiles
                const data = this._loadUserProfiles();
                for (const pname of Object.keys(data.profiles)) {
                    data.profiles[pname] = data.profiles[pname].filter(n => n !== name);
                }
                this._saveUserProfiles(data);
            },
            _loadUserProfiles() {
                try {
                    const data = JSON.parse(localStorage.getItem('ox:profiles'));
                    if (data && data.profiles && Object.keys(data.profiles).length > 0) {
                        return data;
                    }
                } catch (_) {}
                return { active: FACTORY_PROFILE, profiles: { 'default': [] } };
            },
            _saveUserProfiles(data) {
                localStorage.setItem('ox:profiles', JSON.stringify(data));
            },
            getActiveProfile() { return this._loadUserProfiles().active; },
            setActiveProfile(name) {
                const data = this._loadUserProfiles();
                data.active = name;
                this._saveUserProfiles(data);
            },
            getProfileTools(name) {
                if (name === FACTORY_PROFILE) return BUILTIN_TOOLS.map(t => t.name);
                const data = this._loadUserProfiles();
                return data.profiles[name] || [];
            },
            setProfileTools(name, toolNames) {
                if (name === FACTORY_PROFILE) return;
                const data = this._loadUserProfiles();
                data.profiles[name] = toolNames;
                this._saveUserProfiles(data);
            },
            createProfile(name) {
                if (name === FACTORY_PROFILE) return;
                const data = this._loadUserProfiles();
                if (!data.profiles[name]) data.profiles[name] = [];
                this._saveUserProfiles(data);
            },
            deleteProfile(name) {
                if (name === FACTORY_PROFILE) return;
                const data = this._loadUserProfiles();
                delete data.profiles[name];
                const remaining = Object.keys(data.profiles);
                data.active = remaining.length > 0 ? remaining[0] : FACTORY_PROFILE;
                this._saveUserProfiles(data);
            },
            profileNames() {
                const userNames = Object.keys(this._loadUserProfiles().profiles);
                return [FACTORY_PROFILE, ...userNames];
            },
        };

        // Set of currently registered JS tool names (for unregistering)
        let activeJsTools = new Set();

        function compileTool(def) {
            const schemaObj = parseParamSignature(def.params);
            const paramNames = Object.keys(schemaObj.properties);
            const destructureArg = paramNames.length > 0
                ? '{' + paramNames.join(', ') + '}'
                : '_';
            const userFn = new Function(destructureArg, def.body);
            const callback = (inputJson) => {
                try {
                    return String(userFn(JSON.parse(inputJson)));
                } catch (e) {
                    return 'error: ' + (e.message || e);
                }
            };
            return { schemaJson: JSON.stringify(schemaObj), callback };
        }

        function applyProfile(agent, profileName) {
            // Unregister all current JS tools
            for (const name of activeJsTools) {
                agent.unregister_tool(name);
            }
            activeJsTools.clear();
            // Register the profile's tools from the library
            const toolNames = ToolStore.getProfileTools(profileName);
            const lib = ToolStore.loadLibrary();
            for (const name of toolNames) {
                const def = lib[name];
                if (!def) continue;
                try {
                    const { schemaJson, callback } = compileTool(def);
                    agent.register_tool(name, def.description, schemaJson, callback);
                    activeJsTools.add(name);
                } catch (_) {
                    // Skip tools that fail to compile
                }
            }
            ToolStore.setActiveProfile(profileName);
        }

        function refreshToolPanel(agent) {
            toolPanelEl.textContent = '';
            const activeProfile = ToolStore.getActiveProfile();
            const isFactory = ToolStore.isFactory(activeProfile);
            const lib = ToolStore.loadLibrary();
            const profileTools = ToolStore.getProfileTools(activeProfile);

            // Profile row
            const profileRow = document.createElement('div');
            profileRow.className = 'profile-row';
            const select = document.createElement('select');
            for (const pname of ToolStore.profileNames()) {
                const opt = document.createElement('option');
                opt.value = pname;
                opt.textContent = pname;
                if (pname === activeProfile) opt.selected = true;
                select.appendChild(opt);
            }
            select.addEventListener('change', () => {
                applyProfile(agent, select.value);
                refreshToolPanel(agent);
            });
            profileRow.appendChild(select);

            const newBtn = document.createElement('button');
            newBtn.className = 'edit-btn';
            newBtn.textContent = 'new';
            newBtn.addEventListener('click', () => {
                showNewProfileInput(agent, profileRow);
            });
            profileRow.appendChild(newBtn);

            const delBtn = document.createElement('button');
            delBtn.className = 'edit-btn';
            delBtn.textContent = 'del';
            delBtn.disabled = isFactory;
            delBtn.addEventListener('click', () => {
                if (isFactory) return;
                ToolStore.deleteProfile(activeProfile);
                const fallback = ToolStore.profileNames()[0];
                applyProfile(agent, fallback);
                refreshToolPanel(agent);
            });
            profileRow.appendChild(delBtn);

            if (!isFactory) {
                const resetBtn = document.createElement('button');
                resetBtn.className = 'edit-btn';
                resetBtn.textContent = 'reset';
                resetBtn.addEventListener('click', () => {
                    for (const name of activeJsTools) {
                        agent.unregister_tool(name);
                    }
                    activeJsTools.clear();
                    ToolStore.setProfileTools(activeProfile, []);
                    refreshToolPanel(agent);
                });
                profileRow.appendChild(resetBtn);
            }

            toolPanelEl.appendChild(profileRow);

            // Divider
            const hr1 = document.createElement('hr');
            hr1.className = 'tool-panel-divider';
            toolPanelEl.appendChild(hr1);

            // Tool library list — on factory profile show only builtins
            const toolNames = isFactory
                ? BUILTIN_TOOLS.map(t => t.name)
                : Object.keys(lib).sort();
            if (toolNames.length > 0) {
                const listDiv = document.createElement('div');
                listDiv.className = 'tool-library-list';
                for (const name of toolNames) {
                    const isBuiltin = BUILTIN_NAMES.has(name);
                    const wrapper = document.createElement('div');
                    const row = document.createElement('div');
                    row.className = 'tool-library-row';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = profileTools.includes(name);
                    cb.disabled = isFactory;
                    if (!isFactory) {
                        cb.addEventListener('change', () => {
                            if (cb.checked) {
                                const def = lib[name];
                                try {
                                    const { schemaJson, callback } = compileTool(def);
                                    agent.register_tool(name, def.description, schemaJson, callback);
                                    activeJsTools.add(name);
                                    const updated = ToolStore.getProfileTools(activeProfile);
                                    if (!updated.includes(name)) updated.push(name);
                                    ToolStore.setProfileTools(activeProfile, updated);
                                } catch (e) {
                                    cb.checked = false;
                                }
                            } else {
                                agent.unregister_tool(name);
                                activeJsTools.delete(name);
                                const updated = ToolStore.getProfileTools(activeProfile).filter(n => n !== name);
                                ToolStore.setProfileTools(activeProfile, updated);
                            }
                        });
                    }
                    row.appendChild(cb);
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'tool-lib-name';
                    nameSpan.textContent = name;
                    row.appendChild(nameSpan);
                    if (!isFactory) {
                        const copyToolBtn = document.createElement('button');
                        copyToolBtn.className = 'tool-lib-del';
                        copyToolBtn.textContent = 'copy';
                        copyToolBtn.addEventListener('click', () => {
                            prefillAddForm(lib[name]);
                        });
                        row.appendChild(copyToolBtn);
                        if (!isBuiltin) {
                            const editToolBtn = document.createElement('button');
                            editToolBtn.className = 'tool-lib-del';
                            editToolBtn.textContent = 'edit';
                            editToolBtn.addEventListener('click', () => {
                                showToolEditForm(agent, wrapper, lib[name]);
                            });
                            row.appendChild(editToolBtn);
                            const delToolBtn = document.createElement('button');
                            delToolBtn.className = 'tool-lib-del';
                            delToolBtn.textContent = 'del';
                            delToolBtn.addEventListener('click', () => {
                                if (activeJsTools.has(name)) {
                                    agent.unregister_tool(name);
                                    activeJsTools.delete(name);
                                }
                                ToolStore.deleteTool(name);
                                refreshToolPanel(agent);
                            });
                            row.appendChild(delToolBtn);
                        }
                    }
                    wrapper.appendChild(row);
                    listDiv.appendChild(wrapper);
                }
                toolPanelEl.appendChild(listDiv);
            } else {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'tool-panel-empty';
                emptyDiv.textContent = 'no tools in library';
                toolPanelEl.appendChild(emptyDiv);
            }

            // Add form — only on non-factory profiles
            if (!isFactory) {
                const hr2 = document.createElement('hr');
                hr2.className = 'tool-panel-divider';
                toolPanelEl.appendChild(hr2);

                const addDetails = document.createElement('details');
                const addSummary = document.createElement('summary');
                addSummary.textContent = 'add new tool...';
                addSummary.style.cursor = 'pointer';
                addSummary.style.color = '#7fdbca';
                addSummary.style.fontSize = '12px';
                addSummary.style.userSelect = 'none';
                addDetails.appendChild(addSummary);

                const formDiv = document.createElement('div');
                formDiv.style.paddingTop = '8px';

                const fields = [
                    { id: 'add-tool-name', label: 'name', placeholder: 'my_tool', tag: 'input' },
                    { id: 'add-tool-desc', label: 'description', placeholder: 'What this tool does', tag: 'input' },
                    { id: 'add-tool-params', label: 'parameters (TypeScript style)', placeholder: '(text: string, count?: number)', tag: 'input' },
                    { id: 'add-tool-body', label: 'function body (params available by name; return a string)', placeholder: 'return String(n + 2);', tag: 'textarea' },
                ];
                const inputs = {};
                for (const f of fields) {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'tool-form-field';
                    const lbl = document.createElement('label');
                    lbl.textContent = f.label;
                    fieldDiv.appendChild(lbl);
                    const el = document.createElement(f.tag);
                    el.placeholder = f.placeholder;
                    if (f.tag === 'textarea') el.rows = 4;
                    fieldDiv.appendChild(el);
                    formDiv.appendChild(fieldDiv);
                    inputs[f.id] = el;
                }

                const errorEl = document.createElement('div');
                errorEl.className = 'tool-form-error';

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'tool-form-actions';
                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-btn';
                saveBtn.textContent = 'save';
                saveBtn.addEventListener('click', () => {
                    errorEl.textContent = '';
                    const name = inputs['add-tool-name'].value.trim();
                    const description = inputs['add-tool-desc'].value.trim();
                    const params = inputs['add-tool-params'].value.trim();
                    const body = inputs['add-tool-body'].value.trim();

                    if (!name || !description || !params || !body) {
                        errorEl.textContent = 'All fields are required.';
                        return;
                    }

                    const def = { name, description, params, body };

                    try {
                        compileTool(def);
                    } catch (e) {
                        errorEl.textContent = 'Invalid: ' + e.message;
                        return;
                    }

                    ToolStore.saveTool(def);
                    try {
                        const { schemaJson, callback } = compileTool(def);
                        agent.register_tool(name, description, schemaJson, callback);
                        activeJsTools.add(name);
                        const updated = ToolStore.getProfileTools(activeProfile);
                        if (!updated.includes(name)) updated.push(name);
                        ToolStore.setProfileTools(activeProfile, updated);
                    } catch (e) {
                        errorEl.textContent = 'Saved to library but registration failed: ' + e.message;
                        refreshToolPanel(agent);
                        return;
                    }

                    refreshToolPanel(agent);
                });
                actionsDiv.appendChild(saveBtn);
                formDiv.appendChild(actionsDiv);
                formDiv.appendChild(errorEl);
                addDetails.appendChild(formDiv);
                toolPanelEl.appendChild(addDetails);

                // Pre-fill the add form from an existing tool definition (used by copy)
                function prefillAddForm(srcDef) {
                    let copyName = srcDef.name + '_copy';
                    while (lib[copyName]) copyName += '_copy';
                    inputs['add-tool-name'].value = copyName;
                    inputs['add-tool-desc'].value = srcDef.description;
                    inputs['add-tool-params'].value = srcDef.params;
                    inputs['add-tool-body'].value = srcDef.body;
                    addDetails.open = true;
                    inputs['add-tool-name'].focus();
                    inputs['add-tool-name'].select();
                }
            }
        }

        function showToolEditForm(agent, wrapper, def) {
            // Remove any existing edit form in this wrapper
            const existing = wrapper.querySelector('.tool-edit-form');
            if (existing) { existing.remove(); return; }

            const form = document.createElement('div');
            form.className = 'tool-edit-form';
            form.style.paddingLeft = '22px';
            form.style.paddingTop = '4px';
            form.style.paddingBottom = '4px';

            const editFields = [
                { key: 'description', label: 'description', val: def.description, tag: 'input' },
                { key: 'params', label: 'parameters', val: def.params, tag: 'input' },
                { key: 'body', label: 'body', val: def.body, tag: 'textarea' },
            ];
            const editInputs = {};
            for (const f of editFields) {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'tool-form-field';
                const lbl = document.createElement('label');
                lbl.textContent = f.label;
                fieldDiv.appendChild(lbl);
                const el = document.createElement(f.tag);
                el.value = f.val;
                if (f.tag === 'textarea') el.rows = 3;
                fieldDiv.appendChild(el);
                form.appendChild(fieldDiv);
                editInputs[f.key] = el;
            }

            const errEl = document.createElement('div');
            errEl.className = 'tool-form-error';

            const actions = document.createElement('div');
            actions.className = 'edit-actions';
            const saveBtn = document.createElement('button');
            saveBtn.className = 'save-btn';
            saveBtn.textContent = 'save';
            saveBtn.addEventListener('click', () => {
                errEl.textContent = '';
                const updated = {
                    name: def.name,
                    description: editInputs.description.value.trim(),
                    params: editInputs.params.value.trim(),
                    body: editInputs.body.value.trim(),
                };
                if (!updated.description || !updated.params || !updated.body) {
                    errEl.textContent = 'All fields are required.';
                    return;
                }
                try { compileTool(updated); } catch (e) {
                    errEl.textContent = 'Invalid: ' + e.message;
                    return;
                }
                ToolStore.saveTool(updated);
                // Re-register if currently active
                if (activeJsTools.has(def.name)) {
                    const { schemaJson, callback } = compileTool(updated);
                    agent.unregister_tool(def.name);
                    agent.register_tool(def.name, updated.description, schemaJson, callback);
                }
                refreshToolPanel(agent);
            });
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'cancel-btn';
            cancelBtn.textContent = 'cancel';
            cancelBtn.addEventListener('click', () => form.remove());
            actions.appendChild(saveBtn);
            actions.appendChild(cancelBtn);
            form.appendChild(actions);
            form.appendChild(errEl);
            wrapper.appendChild(form);
        }

        function showNewProfileInput(agent, profileRow) {
            // Replace the profile row content with a text input
            const container = profileRow.parentElement;
            const inputRow = document.createElement('div');
            inputRow.className = 'profile-row';
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'profile-name-input';
            nameInput.placeholder = 'profile name';
            inputRow.appendChild(nameInput);
            const okBtn = document.createElement('button');
            okBtn.className = 'save-btn';
            okBtn.textContent = 'ok';
            okBtn.style.fontSize = '11px';
            okBtn.style.padding = '2px 8px';
            okBtn.style.fontWeight = 'normal';
            okBtn.addEventListener('click', () => {
                const name = nameInput.value.trim();
                if (!name || name === FACTORY_PROFILE) {
                    nameInput.style.borderColor = '#ff5370';
                    return;
                }
                ToolStore.createProfile(name);
                applyProfile(agent, name);
                refreshToolPanel(agent);
            });
            inputRow.appendChild(okBtn);
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'cancel-btn';
            cancelBtn.textContent = 'cancel';
            cancelBtn.style.fontSize = '11px';
            cancelBtn.style.padding = '2px 8px';
            cancelBtn.style.fontWeight = 'normal';
            cancelBtn.addEventListener('click', () => refreshToolPanel(agent));
            inputRow.appendChild(cancelBtn);
            container.replaceChild(inputRow, profileRow);
            nameInput.focus();
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') okBtn.click();
                if (e.key === 'Escape') cancelBtn.click();
            });
        }

        // --- TS-style parameter signature → JSON Schema ---

        const TS_TYPE_MAP = {
            string: 'string',
            number: 'number',
            boolean: 'boolean',
            integer: 'integer',
        };

        function parseParamSignature(sig) {
            sig = sig.trim();
            if (sig.startsWith('(') && sig.endsWith(')')) {
                sig = sig.slice(1, -1);
            }
            const properties = {};
            const required = [];
            if (!sig) return { type: 'object', properties, required };
            for (const param of sig.split(',')) {
                const trimmed = param.trim();
                if (!trimmed) continue;
                const m = trimmed.match(/^(\w+)(\?)?\s*:\s*(\w+)$/);
                if (!m) throw new Error('cannot parse "' + trimmed + '"');
                const [, name, optional, tsType] = m;
                const jsonType = TS_TYPE_MAP[tsType.toLowerCase()];
                if (!jsonType) throw new Error('unknown type "' + tsType + '"');
                properties[name] = { type: jsonType };
                if (!optional) required.push(name);
            }
            return { type: 'object', properties, required };
        }

        function append(text, cls) {
            const span = document.createElement('span');
            span.className = cls || '';
            span.textContent = text;
            output.appendChild(span);
            output.scrollTop = output.scrollHeight;
        }

        function appendLine(text, cls) {
            append(text + '\n', cls);
        }

        // --- context debugger rendering ---

        function refreshDebugger(agent) {
            const raw = agent.debug_context();
            if (!raw) return;
            const ctx = JSON.parse(raw);
            debugger_.textContent = '';

            // /system (editable)
            debugger_.appendChild(makeSystemSection(agent, ctx.system));

            // /model
            debugger_.appendChild(makeSection('/model', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                const m = ctx.model || {};
                body.appendChild(makeKV('id', m.id, 'str'));
                body.appendChild(makeKV('max_tokens', m.max_tokens, 'num'));
                return body;
            }, true));

            // /tools
            const tools = ctx.tools || [];
            debugger_.appendChild(makeSection('/tools (' + tools.length + ')', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                if (tools.length === 0) {
                    body.appendChild(makeEmpty('none'));
                    return body;
                }
                for (const t of tools) {
                    const entry = document.createElement('details');
                    const sum = document.createElement('summary');
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'tool-name';
                    nameSpan.textContent = t.name;
                    sum.appendChild(nameSpan);
                    entry.appendChild(sum);
                    const inner = document.createElement('div');
                    inner.className = 'section-body';
                    inner.appendChild(makeKV('description', t.description, 'str'));
                    const schemaLine = document.createElement('div');
                    schemaLine.className = 'kv';
                    const sk = document.createElement('span');
                    sk.className = 'k';
                    sk.textContent = 'input_schema';
                    const sv = document.createElement('pre');
                    sv.className = 'v';
                    sv.textContent = JSON.stringify(t.input_schema, null, 2);
                    sv.style.margin = '0';
                    sv.style.whiteSpace = 'pre-wrap';
                    schemaLine.appendChild(sk);
                    schemaLine.appendChild(sv);
                    inner.appendChild(schemaLine);
                    entry.appendChild(inner);
                    body.appendChild(entry);
                }
                return body;
            }));

            // /history
            const hist = ctx.history || {};
            const count = hist.count || 0;
            const messages = hist.messages || [];
            debugger_.appendChild(makeSection('/history (' + count + ')', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                if (messages.length === 0) {
                    body.appendChild(makeEmpty('empty'));
                    return body;
                }
                for (let i = 0; i < messages.length; i++) {
                    body.appendChild(renderMessage(i, messages[i]));
                }
                return body;
            }, true));
        }

        function refreshRequestLog() {
            requestLogEl.textContent = '';
            if (requestLog.length === 0) {
                requestLogEl.appendChild(makeEmpty('no requests yet'));
                return;
            }
            for (let i = 0; i < requestLog.length; i++) {
                const entry = requestLog[i];
                let parsed;
                try { parsed = JSON.parse(entry.data); } catch (_) { parsed = null; }
                const msgCount = parsed && parsed.messages ? parsed.messages.length : '?';
                const toolCount = parsed && parsed.tools ? parsed.tools.length : 0;
                const ts = entry.timestamp;
                const timeStr = [
                    String(ts.getHours()).padStart(2, '0'),
                    String(ts.getMinutes()).padStart(2, '0'),
                    String(ts.getSeconds()).padStart(2, '0'),
                ].join(':');

                const details = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = '#' + i + ' ' + timeStr
                    + ' \u2014 ' + msgCount + ' messages, '
                    + toolCount + ' tool' + (toolCount !== 1 ? 's' : '');
                details.appendChild(summary);
                const pre = document.createElement('pre');
                pre.className = 'request-json';
                pre.textContent = parsed
                    ? JSON.stringify(parsed, null, 2)
                    : entry.data;
                details.appendChild(pre);
                requestLogEl.appendChild(details);
            }
        }

        function makeSection(label, buildBody, startOpen) {
            const details = document.createElement('details');
            if (startOpen) details.open = true;
            const summary = document.createElement('summary');
            summary.textContent = label;
            details.appendChild(summary);
            details.appendChild(buildBody());
            return details;
        }

        function makeKV(key, value, type) {
            const row = document.createElement('div');
            row.className = 'kv';
            const k = document.createElement('span');
            k.className = 'k';
            k.textContent = key;
            const v = document.createElement('span');
            v.className = 'v ' + (type === 'str' ? 'str-val' : type === 'num' ? 'num-val' : '');
            v.textContent = value != null ? String(value) : 'null';
            row.appendChild(k);
            row.appendChild(v);
            return row;
        }

        function makeEmpty(text) {
            const el = document.createElement('div');
            el.className = 'empty';
            el.textContent = text;
            return el;
        }

        function makeSystemSection(agent, systemVal) {
            const details = document.createElement('details');
            details.open = true;
            const summary = document.createElement('summary');
            const header = document.createElement('span');
            header.className = 'section-header';
            header.textContent = '/system ';
            const editBtn = document.createElement('button');
            editBtn.className = 'edit-btn';
            editBtn.textContent = 'edit';
            editBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                showEditMode();
            });
            header.appendChild(editBtn);
            summary.appendChild(header);
            details.appendChild(summary);

            const body = document.createElement('div');
            body.className = 'section-body';
            const fullText = systemVal != null ? String(systemVal) : '';

            function showReadMode() {
                body.textContent = '';
                if (fullText) {
                    const pre = document.createElement('div');
                    pre.className = 'str-val';
                    pre.textContent = fullText.length > 200
                        ? fullText.slice(0, 200) + '...'
                        : fullText;
                    body.appendChild(pre);
                } else {
                    body.appendChild(makeEmpty('null'));
                }
            }

            function showEditMode() {
                body.textContent = '';
                const textarea = document.createElement('textarea');
                textarea.className = 'system-textarea';
                textarea.value = fullText;
                body.appendChild(textarea);

                const actions = document.createElement('div');
                actions.className = 'edit-actions';
                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-btn';
                saveBtn.textContent = 'save';
                saveBtn.addEventListener('click', () => {
                    try {
                        agent.set_system_prompt(textarea.value);
                        // context_changed event will refresh the debugger
                    } catch (err) {
                        alert('Failed to save: ' + err);
                    }
                });
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'cancel-btn';
                cancelBtn.textContent = 'cancel';
                cancelBtn.addEventListener('click', () => {
                    refreshDebugger(agent);
                });
                actions.appendChild(saveBtn);
                actions.appendChild(cancelBtn);
                body.appendChild(actions);

                textarea.focus();
            }

            showReadMode();
            details.appendChild(body);
            return details;
        }

        function renderMessage(index, msg) {
            const entry = document.createElement('div');
            entry.className = 'msg-entry';

            const role = msg.role || '?';
            const header = document.createElement('div');

            const idx = document.createElement('span');
            idx.style.color = '#546e7a';
            idx.textContent = '#' + index + ' ';

            header.appendChild(idx);

            // Detect tool_result messages (role=user but content is array of tool_result)
            let isToolResult = false;
            if (role === 'user' && Array.isArray(msg.content)
                && msg.content.length > 0
                && msg.content[0].type === 'tool_result') {
                isToolResult = true;
            }

            const badge = document.createElement('span');
            badge.className = 'role-badge ';
            if (isToolResult) {
                badge.className += 'role-tool-result';
                badge.textContent = 'tool_result';
            } else if (role === 'assistant') {
                badge.className += 'role-assistant';
                badge.textContent = 'assistant';
            } else {
                badge.className += 'role-user';
                badge.textContent = 'user';
            }
            header.appendChild(badge);
            entry.appendChild(header);

            // Content
            const content = document.createElement('div');
            content.className = 'msg-content';

            if (isToolResult) {
                for (const r of msg.content) {
                    const line = document.createElement('div');
                    const tid = document.createElement('span');
                    tid.style.color = '#546e7a';
                    tid.textContent = r.tool_use_id ? r.tool_use_id.slice(0, 12) + '...' : '?';
                    line.appendChild(tid);
                    const arrow = document.createElement('span');
                    arrow.style.color = '#546e7a';
                    arrow.textContent = ' \u2192 ';
                    line.appendChild(arrow);
                    const val = document.createElement('span');
                    val.className = 'str-val';
                    val.textContent = r.content || '';
                    line.appendChild(val);
                    content.appendChild(line);
                }
            } else if (role === 'assistant' && Array.isArray(msg.content)) {
                for (const block of msg.content) {
                    const line = document.createElement('div');
                    if (block.type === 'text') {
                        const tag = document.createElement('span');
                        tag.className = 'block-tag';
                        tag.textContent = '[text] ';
                        line.appendChild(tag);
                        const val = document.createElement('span');
                        const t = block.text || '';
                        val.textContent = t.length > 120 ? t.slice(0, 120) + '...' : t;
                        line.appendChild(val);
                    } else if (block.type === 'tool_use') {
                        const tag = document.createElement('span');
                        tag.className = 'block-tag';
                        tag.textContent = '[tool_use] ';
                        line.appendChild(tag);
                        const name = document.createElement('span');
                        name.className = 'tool-name';
                        name.textContent = block.name + ' ';
                        line.appendChild(name);
                        const input = document.createElement('span');
                        input.style.color = '#546e7a';
                        input.textContent = JSON.stringify(block.input);
                        line.appendChild(input);
                    }
                    content.appendChild(line);
                }
            } else {
                // Plain user message
                const text = typeof msg.content === 'string'
                    ? msg.content
                    : JSON.stringify(msg.content);
                content.textContent = text.length > 200
                    ? text.slice(0, 200) + '...'
                    : text;
            }

            entry.appendChild(content);
            return entry;
        }

        // --- main ---

        async function main() {
            await init('/pkg/ox_web_bg.wasm');

            const systemPrompt = [
                'You are a helpful assistant with access to a tool called reverse_text.',
                'When the user asks you to reverse text, use the reverse_text tool.',
                'After getting the tool result, report it to the user.',
            ].join(' ');

            const serverUrl = window.location.origin;
            const agent = create_agent(systemPrompt, serverUrl);

            // Initial debugger state
            refreshDebugger(agent);

            // Stream events to the output
            let currentAssistantSpan = null;
            agent.on_event(function(event) {
                switch (event.type) {
                    case 'turn_start':
                        setStatus('thinking...', '');
                        break;
                    case 'request_sent': {
                        let model = '';
                        try { model = JSON.parse(event.data).model || ''; } catch (_) {}
                        setStatus('prompting', model ? '(' + model + ')' : '');
                        requestLog.push({
                            timestamp: new Date(),
                            data: event.data,
                        });
                        refreshRequestLog();
                        break;
                    }
                    case 'text_delta':
                        setStatus('streaming response...', '');
                        if (!currentAssistantSpan) {
                            currentAssistantSpan = document.createElement('span');
                            currentAssistantSpan.className = 'assistant-msg';
                            output.appendChild(currentAssistantSpan);
                        }
                        currentAssistantSpan.textContent += event.data;
                        output.scrollTop = output.scrollHeight;
                        break;
                    case 'tool_call_start':
                        setStatus('calling tool', event.data);
                        currentAssistantSpan = null;
                        appendLine('\n[tool call: ' + event.data + ']', 'tool-call');
                        break;
                    case 'tool_call_result':
                        appendLine('[tool result: ' + event.data + ']', 'tool-result');
                        break;
                    case 'turn_end':
                        setStatus('', '');
                        currentAssistantSpan = null;
                        append('\n');
                        break;
                    case 'error':
                        setStatus('', '');
                        currentAssistantSpan = null;
                        appendLine('Error: ' + event.data, 'error');
                        break;
                    case 'context_changed':
                        refreshDebugger(agent);
                        break;
                }
            });

            // Restore persisted tools and render tool panel
            applyProfile(agent, ToolStore.getActiveProfile());
            refreshToolPanel(agent);

            output.textContent = '';
            appendLine('Ready. Try: "reverse the word hello"', 'system');

            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();

            async function send() {
                const text = input.value.trim();
                if (!text) return;

                input.value = '';
                input.disabled = true;
                sendBtn.disabled = true;
                currentAssistantSpan = null;

                appendLine('\n> ' + text, 'user-msg');

                try {
                    await agent.prompt(text);
                } catch (e) {
                    appendLine('Error: ' + e, 'error');
                }

                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }

            sendBtn.addEventListener('click', send);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') send();
            });
        }

        main().catch(e => {
            output.textContent = 'Failed to load: ' + e;
        });
    </script>
