<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ox prototype</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 40px 20px;
        }
        .container {
            display: flex;
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-column {
            flex: 1;
            min-width: 0;
            max-width: 720px;
        }
        .debug-column {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 { margin-bottom: 20px; color: #7fdbca; }
        #output {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 16px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user-msg { color: #82aaff; }
        .assistant-msg { color: #c3e88d; }
        .tool-call { color: #ffcb6b; }
        .tool-result { color: #c792ea; }
        .error { color: #ff5370; }
        .system { color: #546e7a; font-style: italic; }
        #input-row {
            display: flex;
            gap: 8px;
        }
        #input {
            flex: 1;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            outline: none;
        }
        #input:focus { border-color: #7fdbca; }
        button {
            padding: 10px 20px;
            font-family: monospace;
            font-size: 14px;
            background: #7fdbca;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #5fb8a0; }
        button:disabled { background: #546e7a; cursor: not-allowed; }

        /* --- context debugger --- */
        .debug-header {
            color: #7fdbca;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .debug-header h2 {
            font-size: 14px;
            color: #7fdbca;
        }
        .debug-header .path {
            color: #546e7a;
        }
        .debug-panel {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            max-height: 720px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }
        .debug-panel details {
            margin-bottom: 2px;
        }
        .debug-panel summary {
            cursor: pointer;
            color: #7fdbca;
            padding: 4px 0;
            user-select: none;
            list-style: none;
        }
        .debug-panel summary::before {
            content: '\25b8 ';
            color: #546e7a;
        }
        .debug-panel details[open] > summary::before {
            content: '\25be ';
        }
        .debug-panel .section-body {
            padding-left: 16px;
            border-left: 1px solid #2a2a4a;
            margin-left: 4px;
            margin-bottom: 8px;
        }
        .debug-panel .kv {
            display: flex;
            gap: 8px;
        }
        .debug-panel .kv .k {
            color: #546e7a;
            flex-shrink: 0;
        }
        .debug-panel .kv .v {
            color: #e0e0e0;
            word-break: break-all;
        }
        .debug-panel .str-val {
            color: #c3e88d;
        }
        .debug-panel .num-val {
            color: #f78c6c;
        }
        .debug-panel .empty {
            color: #546e7a;
            font-style: italic;
        }

        /* --- context debugger --- */
        .debug-panel .msg-entry {
            margin-bottom: 4px;
        }
        .debug-panel .role-badge {
            display: inline-block;
            padding: 0 4px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
        }
        .debug-panel .role-user {
            background: #1a2744;
            color: #82aaff;
        }
        .debug-panel .role-assistant {
            background: #1a2e1a;
            color: #c3e88d;
        }
        .debug-panel .role-tool-result {
            background: #2a1a2e;
            color: #c792ea;
        }
        .debug-panel .block-tag {
            color: #546e7a;
            font-size: 11px;
        }
        .debug-panel .tool-name {
            color: #ffcb6b;
        }
        .debug-panel .msg-content {
            padding-left: 16px;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .debug-panel .msg-content-trunc {
            color: #546e7a;
            font-style: italic;
        }
        .debug-panel .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .debug-panel .edit-btn {
            padding: 1px 6px;
            font-size: 11px;
            font-family: monospace;
            background: transparent;
            color: #546e7a;
            border: 1px solid #546e7a;
            border-radius: 2px;
            cursor: pointer;
            font-weight: normal;
        }
        .debug-panel .edit-btn:hover {
            color: #7fdbca;
            border-color: #7fdbca;
        }
        .debug-panel .system-textarea {
            width: 100%;
            min-height: 120px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            background: #0d1a30;
            color: #c3e88d;
            border: 1px solid #7fdbca;
            border-radius: 2px;
            resize: vertical;
            outline: none;
        }
        .debug-panel .edit-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .debug-panel .edit-actions button {
            padding: 2px 10px;
            font-size: 11px;
            font-family: monospace;
            border-radius: 2px;
            font-weight: normal;
        }
        .debug-panel .save-btn {
            background: #7fdbca;
            color: #1a1a2e;
            border: none;
            cursor: pointer;
        }
        .debug-panel .save-btn:hover { background: #5fb8a0; }
        .debug-panel .cancel-btn {
            background: transparent;
            color: #546e7a;
            border: 1px solid #546e7a;
            cursor: pointer;
        }
        .debug-panel .cancel-btn:hover {
            color: #e0e0e0;
            border-color: #e0e0e0;
        }

        /* --- request log --- */
        .debug-panel .request-json {
            background: #0d1a30;
            color: #e0e0e0;
            padding: 8px;
            margin: 4px 0;
            border-radius: 2px;
            font-size: 11px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-column">
            <h1>ox prototype</h1>
            <div id="output"><span class="system">Loading wasm module...</span>
</div>
            <div id="input-row">
                <input id="input" type="text" placeholder="Type a message..." disabled />
                <button id="send" disabled>Send</button>
            </div>
        </div>
        <div class="debug-column">
            <div>
                <div class="debug-header">
                    <h2>context</h2>
                    <span class="path">/</span>
                </div>
                <div id="debugger" class="debug-panel"><span class="empty">waiting for wasm...</span></div>
            </div>
            <div>
                <div class="debug-header">
                    <h2>request log</h2>
                </div>
                <div id="request-log" class="debug-panel"><span class="empty">no requests yet</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { create_agent } from '/pkg/ox_web.js';

        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const debugger_ = document.getElementById('debugger');
        const requestLogEl = document.getElementById('request-log');

        let requestLog = [];

        function append(text, cls) {
            const span = document.createElement('span');
            span.className = cls || '';
            span.textContent = text;
            output.appendChild(span);
            output.scrollTop = output.scrollHeight;
        }

        function appendLine(text, cls) {
            append(text + '\n', cls);
        }

        // --- context debugger rendering ---

        function refreshDebugger(agent) {
            const raw = agent.debug_context();
            if (!raw) return;
            const ctx = JSON.parse(raw);
            debugger_.textContent = '';

            // /system (editable)
            debugger_.appendChild(makeSystemSection(agent, ctx.system));

            // /model
            debugger_.appendChild(makeSection('/model', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                const m = ctx.model || {};
                body.appendChild(makeKV('id', m.id, 'str'));
                body.appendChild(makeKV('max_tokens', m.max_tokens, 'num'));
                return body;
            }, true));

            // /tools
            const tools = ctx.tools || [];
            debugger_.appendChild(makeSection('/tools (' + tools.length + ')', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                if (tools.length === 0) {
                    body.appendChild(makeEmpty('none'));
                    return body;
                }
                for (const t of tools) {
                    const entry = document.createElement('details');
                    const sum = document.createElement('summary');
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'tool-name';
                    nameSpan.textContent = t.name;
                    sum.appendChild(nameSpan);
                    entry.appendChild(sum);
                    const inner = document.createElement('div');
                    inner.className = 'section-body';
                    inner.appendChild(makeKV('description', t.description, 'str'));
                    const schemaLine = document.createElement('div');
                    schemaLine.className = 'kv';
                    const sk = document.createElement('span');
                    sk.className = 'k';
                    sk.textContent = 'input_schema';
                    const sv = document.createElement('pre');
                    sv.className = 'v';
                    sv.textContent = JSON.stringify(t.input_schema, null, 2);
                    sv.style.margin = '0';
                    sv.style.whiteSpace = 'pre-wrap';
                    schemaLine.appendChild(sk);
                    schemaLine.appendChild(sv);
                    inner.appendChild(schemaLine);
                    entry.appendChild(inner);
                    body.appendChild(entry);
                }
                return body;
            }));

            // /history
            const hist = ctx.history || {};
            const count = hist.count || 0;
            const messages = hist.messages || [];
            debugger_.appendChild(makeSection('/history (' + count + ')', () => {
                const body = document.createElement('div');
                body.className = 'section-body';
                if (messages.length === 0) {
                    body.appendChild(makeEmpty('empty'));
                    return body;
                }
                for (let i = 0; i < messages.length; i++) {
                    body.appendChild(renderMessage(i, messages[i]));
                }
                return body;
            }, true));
        }

        function refreshRequestLog() {
            requestLogEl.textContent = '';
            if (requestLog.length === 0) {
                requestLogEl.appendChild(makeEmpty('no requests yet'));
                return;
            }
            for (let i = 0; i < requestLog.length; i++) {
                const entry = requestLog[i];
                let parsed;
                try { parsed = JSON.parse(entry.data); } catch (_) { parsed = null; }
                const msgCount = parsed && parsed.messages ? parsed.messages.length : '?';
                const toolCount = parsed && parsed.tools ? parsed.tools.length : 0;
                const ts = entry.timestamp;
                const timeStr = [
                    String(ts.getHours()).padStart(2, '0'),
                    String(ts.getMinutes()).padStart(2, '0'),
                    String(ts.getSeconds()).padStart(2, '0'),
                ].join(':');

                const details = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = '#' + i + ' ' + timeStr
                    + ' \u2014 ' + msgCount + ' messages, '
                    + toolCount + ' tool' + (toolCount !== 1 ? 's' : '');
                details.appendChild(summary);
                const pre = document.createElement('pre');
                pre.className = 'request-json';
                pre.textContent = parsed
                    ? JSON.stringify(parsed, null, 2)
                    : entry.data;
                details.appendChild(pre);
                requestLogEl.appendChild(details);
            }
        }

        function makeSection(label, buildBody, startOpen) {
            const details = document.createElement('details');
            if (startOpen) details.open = true;
            const summary = document.createElement('summary');
            summary.textContent = label;
            details.appendChild(summary);
            details.appendChild(buildBody());
            return details;
        }

        function makeKV(key, value, type) {
            const row = document.createElement('div');
            row.className = 'kv';
            const k = document.createElement('span');
            k.className = 'k';
            k.textContent = key;
            const v = document.createElement('span');
            v.className = 'v ' + (type === 'str' ? 'str-val' : type === 'num' ? 'num-val' : '');
            v.textContent = value != null ? String(value) : 'null';
            row.appendChild(k);
            row.appendChild(v);
            return row;
        }

        function makeEmpty(text) {
            const el = document.createElement('div');
            el.className = 'empty';
            el.textContent = text;
            return el;
        }

        function makeSystemSection(agent, systemVal) {
            const details = document.createElement('details');
            details.open = true;
            const summary = document.createElement('summary');
            const header = document.createElement('span');
            header.className = 'section-header';
            header.textContent = '/system ';
            const editBtn = document.createElement('button');
            editBtn.className = 'edit-btn';
            editBtn.textContent = 'edit';
            editBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                showEditMode();
            });
            header.appendChild(editBtn);
            summary.appendChild(header);
            details.appendChild(summary);

            const body = document.createElement('div');
            body.className = 'section-body';
            const fullText = systemVal != null ? String(systemVal) : '';

            function showReadMode() {
                body.textContent = '';
                if (fullText) {
                    const pre = document.createElement('div');
                    pre.className = 'str-val';
                    pre.textContent = fullText.length > 200
                        ? fullText.slice(0, 200) + '...'
                        : fullText;
                    body.appendChild(pre);
                } else {
                    body.appendChild(makeEmpty('null'));
                }
            }

            function showEditMode() {
                body.textContent = '';
                const textarea = document.createElement('textarea');
                textarea.className = 'system-textarea';
                textarea.value = fullText;
                body.appendChild(textarea);

                const actions = document.createElement('div');
                actions.className = 'edit-actions';
                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-btn';
                saveBtn.textContent = 'save';
                saveBtn.addEventListener('click', () => {
                    try {
                        agent.set_system_prompt(textarea.value);
                        // context_changed event will refresh the debugger
                    } catch (err) {
                        alert('Failed to save: ' + err);
                    }
                });
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'cancel-btn';
                cancelBtn.textContent = 'cancel';
                cancelBtn.addEventListener('click', () => {
                    refreshDebugger(agent);
                });
                actions.appendChild(saveBtn);
                actions.appendChild(cancelBtn);
                body.appendChild(actions);

                textarea.focus();
            }

            showReadMode();
            details.appendChild(body);
            return details;
        }

        function renderMessage(index, msg) {
            const entry = document.createElement('div');
            entry.className = 'msg-entry';

            const role = msg.role || '?';
            const header = document.createElement('div');

            const idx = document.createElement('span');
            idx.style.color = '#546e7a';
            idx.textContent = '#' + index + ' ';

            header.appendChild(idx);

            // Detect tool_result messages (role=user but content is array of tool_result)
            let isToolResult = false;
            if (role === 'user' && Array.isArray(msg.content)
                && msg.content.length > 0
                && msg.content[0].type === 'tool_result') {
                isToolResult = true;
            }

            const badge = document.createElement('span');
            badge.className = 'role-badge ';
            if (isToolResult) {
                badge.className += 'role-tool-result';
                badge.textContent = 'tool_result';
            } else if (role === 'assistant') {
                badge.className += 'role-assistant';
                badge.textContent = 'assistant';
            } else {
                badge.className += 'role-user';
                badge.textContent = 'user';
            }
            header.appendChild(badge);
            entry.appendChild(header);

            // Content
            const content = document.createElement('div');
            content.className = 'msg-content';

            if (isToolResult) {
                for (const r of msg.content) {
                    const line = document.createElement('div');
                    const tid = document.createElement('span');
                    tid.style.color = '#546e7a';
                    tid.textContent = r.tool_use_id ? r.tool_use_id.slice(0, 12) + '...' : '?';
                    line.appendChild(tid);
                    const arrow = document.createElement('span');
                    arrow.style.color = '#546e7a';
                    arrow.textContent = ' \u2192 ';
                    line.appendChild(arrow);
                    const val = document.createElement('span');
                    val.className = 'str-val';
                    val.textContent = r.content || '';
                    line.appendChild(val);
                    content.appendChild(line);
                }
            } else if (role === 'assistant' && Array.isArray(msg.content)) {
                for (const block of msg.content) {
                    const line = document.createElement('div');
                    if (block.type === 'text') {
                        const tag = document.createElement('span');
                        tag.className = 'block-tag';
                        tag.textContent = '[text] ';
                        line.appendChild(tag);
                        const val = document.createElement('span');
                        const t = block.text || '';
                        val.textContent = t.length > 120 ? t.slice(0, 120) + '...' : t;
                        line.appendChild(val);
                    } else if (block.type === 'tool_use') {
                        const tag = document.createElement('span');
                        tag.className = 'block-tag';
                        tag.textContent = '[tool_use] ';
                        line.appendChild(tag);
                        const name = document.createElement('span');
                        name.className = 'tool-name';
                        name.textContent = block.name + ' ';
                        line.appendChild(name);
                        const input = document.createElement('span');
                        input.style.color = '#546e7a';
                        input.textContent = JSON.stringify(block.input);
                        line.appendChild(input);
                    }
                    content.appendChild(line);
                }
            } else {
                // Plain user message
                const text = typeof msg.content === 'string'
                    ? msg.content
                    : JSON.stringify(msg.content);
                content.textContent = text.length > 200
                    ? text.slice(0, 200) + '...'
                    : text;
            }

            entry.appendChild(content);
            return entry;
        }

        // --- main ---

        async function main() {
            await init('/pkg/ox_web_bg.wasm');

            const systemPrompt = [
                'You are a helpful assistant with access to a tool called reverse_text.',
                'When the user asks you to reverse text, use the reverse_text tool.',
                'After getting the tool result, report it to the user.',
            ].join(' ');

            const serverUrl = window.location.origin;
            const agent = create_agent(systemPrompt, serverUrl);

            // Initial debugger state
            refreshDebugger(agent);

            // Stream events to the output
            let currentAssistantSpan = null;
            agent.on_event(function(event) {
                switch (event.type) {
                    case 'text_delta':
                        if (!currentAssistantSpan) {
                            currentAssistantSpan = document.createElement('span');
                            currentAssistantSpan.className = 'assistant-msg';
                            output.appendChild(currentAssistantSpan);
                        }
                        currentAssistantSpan.textContent += event.data;
                        output.scrollTop = output.scrollHeight;
                        break;
                    case 'tool_call_start':
                        currentAssistantSpan = null;
                        appendLine('\n[tool call: ' + event.data + ']', 'tool-call');
                        break;
                    case 'tool_call_result':
                        appendLine('[tool result: ' + event.data + ']', 'tool-result');
                        break;
                    case 'turn_end':
                        currentAssistantSpan = null;
                        append('\n');
                        break;
                    case 'error':
                        currentAssistantSpan = null;
                        appendLine('Error: ' + event.data, 'error');
                        break;
                    case 'request_sent':
                        requestLog.push({
                            timestamp: new Date(),
                            data: event.data,
                        });
                        refreshRequestLog();
                        break;
                    case 'context_changed':
                        refreshDebugger(agent);
                        break;
                }
            });

            output.textContent = '';
            appendLine('Ready. Try: "reverse the word hello"', 'system');

            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();

            async function send() {
                const text = input.value.trim();
                if (!text) return;

                input.value = '';
                input.disabled = true;
                sendBtn.disabled = true;
                currentAssistantSpan = null;

                appendLine('\n> ' + text, 'user-msg');

                try {
                    await agent.prompt(text);
                } catch (e) {
                    appendLine('Error: ' + e, 'error');
                }

                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }

            sendBtn.addEventListener('click', send);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') send();
            });
        }

        main().catch(e => {
            output.textContent = 'Failed to load: ' + e;
        });
    </script>
</body>
</html>
